<input [(ngModel)]="task" placeholder="Enter task">
<button (click)="addTask()">
  {{ editIndex === -1 ? 'Add' : 'Update' }}
</button>

<ul>
  <li *ngFor="let t of tasks; let i = index">
    {{ t }}
    <button (click)="editTask(i)">Edit</button>
    <button (click)="deleteTask(i)">Delete</button>
  </li>
</ul>
