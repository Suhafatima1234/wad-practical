<!DOCTYPE html>
<html>
<head>
    <title>Facebook Page</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="bg-primary text-white p-3 d-flex justify-content-between">
    <h2>facebook</h2>

    <div>
        <input type="text" placeholder="Email or Username">
        <input type="password" placeholder="Password">
        <button class="btn btn-light btn-sm">Login</button>
    </div>
</nav>

<!-- Main Section -->
<div class="container mt-5">
    <div class="row">

        <!-- Left Side -->
        <div class="col-md-6">
            <h4>Facebook is useless without friends.</h4>
            <p>Make More Friends.</p>

            <img src="https://www.cse.iitb.ac.in/~suyoggatkal/staticfb/FacebookLabel.svg" class="img-fluid">
        </div>

        <!-- Right Side -->
        <div class="col-md-6">
            <h3>Create an Account</h3>
            <p>It's free and always will be.</p>

            <form>
                <input class="form-control mb-2" type="text" placeholder="First Name">
                <input class="form-control mb-2" type="text" placeholder="Last Name">
                <input class="form-control mb-2" type="email" placeholder="Email">
                <input class="form-control mb-2" type="password" placeholder="Password">

                <input class="form-control mb-2" type="date">

                <div class="mb-2">
                    <input type="radio"> Male
                    <input type="radio"> Female
                </div>

                <button class="btn btn-success">Signup</button>
            </form>
        </div>

    </div>
</div>
<!--<img class="bg" src="https://sendshort.ai/wp-content/uploads/2024/08/Facebook.jpeg">-->
</body>
</html>
