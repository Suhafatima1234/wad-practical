<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Event Registration Form</h2>

    <form class="needs-validation" novalidate>

        <!-- Name -->
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="name" placeholder="Name" required>
            <label for="name">Full Name</label>
            <div class="invalid-feedback">Please enter your name</div>
        </div>

        <!-- Email -->
        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="Email" required>
            <label for="email">Email address</label>
            <div class="invalid-feedback">Enter valid email</div>
        </div>

        <!-- Phone -->
        <div class="form-floating mb-3">
            <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
            <label for="phone">Phone Number</label>
            <div class="invalid-feedback">Enter phone number</div>
        </div>

        <!-- Event Type -->
        <div class="mb-3">
            <select class="form-select" required>
                <option value="">Select Event</option>
                <option>Workshop</option>
                <option>Seminar</option>
                <option>Hackathon</option>
            </select>
            <div class="invalid-feedback">Please select event</div>
        </div>

        <!-- Tooltip Example -->
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Enter College Name"
                data-bs-toggle="tooltip" title="Enter your full college name" required>
        </div>

        <!-- Submit -->
        <button class="btn btn-success w-100" type="submit">Register</button>

    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script
// Enable validation
src="script.js"></script>


</body>
</html>
