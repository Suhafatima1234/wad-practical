<!DOCTYPE html>
<html ng-app="todoApp">
<head>
    <title>Angular To-Do</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Angular CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body class="bg-light" ng-controller="todoCtrl">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">To-Do List</h2>

        <!-- ADD -->
        <div class="input-group mb-3">
            <input type="text" class="form-control" ng-model="newTask" placeholder="Enter task">
            <button class="btn btn-primary" ng-click="addTask()">Add</button>
        </div>

        <ul class="list-group">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                ng-repeat="task in tasks track by $index">

                <!-- DISPLAY -->
                <span ng-hide="task.editing">{{task.name}}</span>

                <!-- EDIT -->
                <input type="text" class="form-control me-2" ng-model="task.name" ng-show="task.editing">

                <!-- BUTTONS -->
                <div>
                    <button class="btn btn-warning btn-sm me-1" ng-click="task.editing=true">Edit</button>
                    <button class="btn btn-success btn-sm me-1" ng-click="updateTask(task)">Update</button>
                    <button class="btn btn-danger btn-sm" ng-click="deleteTask($index)">Delete</button>
                </div>

            </li>
        </ul>

    </div>
</div>

<script>
var app = angular.module("todoApp", []);

app.controller("todoCtrl", function($scope) {

    $scope.tasks = [];

    $scope.addTask = function() {
        if ($scope.newTask) {
            $scope.tasks.push({ name: $scope.newTask, editing: false });
            $scope.newTask = "";
        }
    };

    $scope.deleteTask = function(index) {
        $scope.tasks.splice(index, 1);
    };

    $scope.updateTask = function(task) {
        task.editing = false;
    };

});
</script>

</body>
</html>
