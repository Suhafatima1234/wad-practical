<!DOCTYPE html>
<html>
    <head>
        <title>PICT Mobile Sites</title>
        <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
        <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script> 
        <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
    </head>
    <body style="background-color:#f0f8ff;">
    
    <div data-role="page" id="home">
        <div data-role="header" data-position="fixed" data-theme="b">
            <h1>PICT</h1>
        </div>

        <div data-role="navbar" data-position="fixed" data-theme="b">
            <ul>
                <li><a href="#about" class="ui-btn ui-btn-b" data-transition="slide">About</a></li>
                <li><a href="#courses" class="ui-btn ui-btn-b" data-transition="slide">Courses</a></li>
                <li><a href="#dept" class="ui-btn ui-btn-b" data-transition="slide">Dept</a></li>
                <li><a href="#contact" class="ui-btn ui-btn-b" data-transition="slide">Contact</a></li>
            </ul>
        </div>

        <div data-role="content">
            <h3>Welcome to PICT</h3>
            <p>Pune Institute of Computer Technology</p>
        </div>

    </div> 

    <div data-role="page" id="about">
        <div data-role="header" data-position="fixed">
            <a href="#home" data-icon="back">Back</a>
            <h1>About</h1>
        </div>
        <div data-role="content">
            <p>PICT is a top engineering college.</p>
        </div>
    </div>

<!---->
    <div data-role="page" id="courses">
        <div data-role="header" data-position="fixed">
            <a href="#home" data-icon="back">Back</a>
            <h1>Courses</h1>
        </div>
        <div data-role="content">
            <div data-role="collapsible">
                <h3>Engineering</h3>
                <p>IT,CS,ENTC</p>
            </div>
        </div>

    </div>
<!---->
    <div data-role="page" id="dept">
        <div data-role="header" data-position="fixed">
            <a href="#home" data-icon="back">Back</a>
            <h1>Department</h1>
        </div>

        <div data-role="content">
            <p data-role="listview" data-inset="true">Computer , IT,ENTC</p>
        </div>

    </div>


    <div data-role="page" id="about"></div>
    

    </body>
</html>
