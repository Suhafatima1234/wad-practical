<!DOCTYPE html>
<html>
<head>
    <title>Login & Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row">

        <!-- REGISTER -->
        <div class="col-md-6">
            <h3 class="text-center">Register</h3>

            <input id="name" class="form-control mb-2" placeholder="Name">
            <input id="email" class="form-control mb-2" placeholder="Email">
            <input id="mobile" class="form-control mb-2" placeholder="Mobile">
            <input id="dob" type="date" class="form-control mb-2">
            <input id="city" class="form-control mb-2" placeholder="City">
            <input id="address" class="form-control mb-2" placeholder="Address">
            <input id="username" class="form-control mb-2" placeholder="Username">
            <input id="password" type="password" class="form-control mb-2" placeholder="Password">

            <button class="btn btn-success w-100" onclick="register()">Register</button>
        </div>

        <!-- LOGIN -->
        <div class="col-md-6">
            <h3 class="text-center">Login</h3>

            <input id="loginUser" class="form-control mb-2" placeholder="Username">
            <input id="loginPass" type="password" class="form-control mb-2" placeholder="Password">

            <button class="btn btn-primary w-100" onclick="login()">Login</button>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
