 <!DOCTYPE html>
 <html>
    <head>
        <title>User data</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body class="bg-light">
        <div class="container mt-5">
            <h2 class="text-center mb-4">Registered user</h2>
            <table class="table table-bordered table-striped text-center" id="table"></table>
        </div>

        <script>
             let users=JSON.parse(localStorage.getItem("users")) || [];
             let table=
             `<tr class="table-dark">
                <th>Name</th>
                 <th>EMail</th>
                  <th>Mobile</th>
                  </tr>`;

                  users.forEach(u =>{
                    table+=`<tr class="table-dark">
                <th>${u.name}</th>
                 <th>${u.email}</th>
                  <th>${u.mobile}</th>
                  </tr>`;
                  });
                 
             document.getElementById("table").innerHTML=table;     
                  

        </script>
    </body>
 </html>
