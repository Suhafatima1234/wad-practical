<!DOCTYPE html>
<html>
    <head>
        <title>W11</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="row">

                <div class="col-md-6">
                    <h3 class="text-center">Register</h3>
                    <input type="text" id="name" class="form-control mb-2" placeholder="Name">
                    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
                    <input type="tel" id="mobile" class="form-control mb-2" placeholder="Phone no.">
                    <input type="date" id="dob" class="form-control mb-2" placeholder="DOB">
                    <input type="text" id="city" class="form-control mb-2" placeholder="City">
                   <textarea id="address" class="form-control mb-2" placeholder="Enter Address"></textarea>
                    <input type="text" id="username" class="form-control mb-2" placeholder="Username">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Password">

                    <button class="btn btn-success w-100" onclick="register()">Register</button>

                </div>

                <div class="col-md-6">
                     <h3 class="text-center">Login</h3>

                     <input type="text" id="loginUser" class="form-control mb-2" placeholder="Username">
                    <input type="password" id="loginPass" class="form-control mb-2" placeholder="Password">

                    <button class="btn btn-success w-100" onclick="login()">Login</button>

                </div>

            </div>
         </div>   
         <script src="testscript.js"></script>
    </body>
</html>
